app = "myplopplop-api"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = "production"
  PORT = "5000"
  JWT_EXPIRE = "7d"
  COMMISSION_RATE = "0.25"
  FRONTEND_URL = "https://myplopplop.com"
