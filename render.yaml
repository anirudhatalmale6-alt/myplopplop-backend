services:
  - type: web
    name: myplopplop-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: COMMISSION_RATE
        value: "0.25"
      - key: FRONTEND_URL
        value: https://myplopplop.com
